<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulário de Produção</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F5F0; --surface: #fff; --border: #E2DDD5; --border2: #C8C2B8;
    --text: #1A1714; --text2: #6B6460; --text3: #9B948E;
    --accent: #1A4FBF; --accent-bg: #EEF3FC; --green: #0F6E56; --green-bg: #E1F5EE;
    --radius: 10px; --radius-lg: 14px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

  .screen-only { display: block; }

  /* Blocos de registro */
  .registro-bloco{border:1px solid #ccc;border-radius:4px;padding:5px 8px;margin-bottom:4px;page-break-inside:avoid}
  .cb-row{display:flex;align-items:flex-start;gap:6px;margin-bottom:4px;font-size:9.5pt}
  .cb-label{font-weight:600;white-space:nowrap;min-width:60px;padding-top:1px}
  .cb-options{display:flex;flex-wrap:wrap;gap:4px 10px}
  .cb-item{display:flex;align-items:center;gap:4px;white-space:nowrap;font-size:9pt}
  .cb-box{display:inline-block;width:12px;height:12px;border:1.5px solid #222;border-radius:1px;flex-shrink:0}
  .extra-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:3px;font-size:8.5pt}
  .extra-field{display:flex;align-items:center;gap:4px}
  .extra-label{font-weight:600;white-space:nowrap;font-size:8pt}
  .extra-line{display:inline-block;border-bottom:1px solid #333;min-width:25mm}
  .campos-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;font-size:9.5pt}
  .campo-fixo{display:flex;align-items:center;gap:4px}
  .campo-wide{flex:1}
  .campo-label{font-weight:700;white-space:nowrap;font-size:9pt}
  .campo-line{display:inline-block;border-bottom:1px solid #333;min-width:20mm;flex:1}

  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-brand { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 15px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }

  .main { max-width: 900px; margin: 0 auto; padding: 28px 20px; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 22px; margin-bottom: 18px;
  }
  .card-title {
    font-size: 13px; font-weight: 600; color: var(--text);
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .card-title .badge {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    background: var(--accent-bg); color: var(--accent); font-weight: 500;
  }

  .fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .fields-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .field-group label {
    display: block; font-size: 11px; font-weight: 500; color: var(--text3);
    text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px;
  }
  .field-group input, .field-group select {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border2);
    border-radius: var(--radius); font-family: 'DM Sans', sans-serif;
    font-size: 13px; background: var(--surface); color: var(--text);
    outline: none; transition: border-color .15s;
  }
  .field-group input:focus, .field-group select:focus { border-color: var(--accent); }

  .logo-area {
    border: 2px dashed var(--border2); border-radius: var(--radius);
    padding: 16px 20px; cursor: pointer; transition: all .2s;
    display: flex; align-items: center; gap: 14px;
    position: relative;
  }
  .logo-area:hover { border-color: var(--accent); background: var(--accent-bg); }
  .logo-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .logo-area img { max-height: 48px; max-width: 120px; object-fit: contain; }
  .logo-area-text { font-size: 12px; color: var(--text3); }
  .logo-area-text strong { display: block; font-size: 13px; color: var(--text2); font-weight: 500; margin-bottom: 2px; }

  /* COLUNAS TOGGLE */
  .cols-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 8px;
  }
  .col-toggle {
    border: 1px solid var(--border2); border-radius: var(--radius);
    padding: 10px 12px; cursor: pointer; transition: all .15s;
    display: flex; align-items: flex-start; gap: 10px;
    user-select: none;
  }
  .col-toggle:hover { border-color: var(--accent); background: var(--accent-bg); }
  .col-toggle.active { border-color: var(--accent); background: var(--accent-bg); }
  .col-toggle.locked { opacity: 0.5; cursor: not-allowed; }
  .col-toggle input { display: none; }
  .toggle-check {
    width: 18px; height: 18px; border-radius: 5px;
    border: 1.5px solid var(--border2); background: #fff;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px; transition: all .15s;
  }
  .col-toggle.active .toggle-check {
    background: var(--accent); border-color: var(--accent);
  }
  .toggle-check svg { display: none; }
  .col-toggle.active .toggle-check svg { display: block; }
  .col-toggle-info { flex: 1; }
  .col-toggle-name { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .col-toggle-desc { font-size: 11px; color: var(--text3); line-height: 1.4; }

  /* NOME PERSONALIZADO */
  .col-name-inputs { margin-top: 14px; }
  .col-name-inputs .hint {
    font-size: 11px; color: var(--text3); margin-bottom: 10px;
  }
  .col-names-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
  }
  .col-name-field label {
    font-size: 10px; font-weight: 500; color: var(--text3);
    text-transform: uppercase; letter-spacing: .04em; margin-bottom: 3px; display: block;
  }
  .col-name-field input {
    width: 100%; padding: 6px 8px; border: 1px solid var(--border);
    border-radius: 7px; font-size: 12px; font-family: 'DM Sans', sans-serif;
    color: var(--text); background: #fafafa; outline: none;
  }
  .col-name-field input:focus { border-color: var(--accent); background: #fff; }

  .action-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
  .btn-print {
    padding: 10px 22px; background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; display: flex; align-items: center; gap: 7px; transition: all .15s;
  }
  .btn-print:hover { background: #163fa0; }
  .btn-ghost {
    padding: 10px 18px; background: #F0EDE6; color: var(--text2);
    border: none; border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .15s;
  }
  .btn-ghost:hover { background: var(--border); }
  .status-msg { font-size: 12px; color: var(--text3); }

  .preview-label {
    font-size: 11px; font-weight: 500; color: var(--text3);
    text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px;
  }
  .preview-scroll { background: #E8E4DC; border-radius: var(--radius-lg); padding: 20px; overflow: auto; }

  /* ══ SHEET (A4) ══ */
  .sheet-page {
    width: 210mm; min-height: 297mm;
    background: #fff; margin: 0 auto;
    padding: 10mm 10mm 8mm 10mm;
    font-family: Arial, sans-serif; font-size: 9pt; color: #000;
    display: flex; flex-direction: column;
  }

  .sheet-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 4mm; gap: 5mm;
  }
  .sheet-logo {
    flex: 0 0 35mm; height: 22mm;
    display: flex; align-items: center; justify-content: center;
    border: 1pt solid #999; border-radius: 2mm; overflow: hidden;
  }
  .sheet-logo img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .sheet-logo-placeholder { font-size: 7pt; color: #bbb; text-align: center; }
  .sheet-company { flex: 1; text-align: center; }
  .sheet-company .emp-nome { font-size: 15pt; font-weight: bold; margin-bottom: 1mm; color: #000; }
  .sheet-company .emp-info { font-size: 8.5pt; color: #333; line-height: 1.6; font-weight: 500; }
  .sheet-meta { flex: 0 0 auto; display: flex; flex-direction: column; gap: 2.5mm; }
  .sheet-meta-row { display: flex; flex-direction: column; gap: 0.5mm; }
  .sheet-meta-row span { font-size: 6.5pt; color: #888; text-transform: uppercase; letter-spacing: .03em; }
  .meta-line { border-bottom: 0.5pt solid #aaa; min-width: 40mm; height: 5mm; background: #fafafa; }

  .sheet-title {
    background: #1A1714; color: #fff; text-align: center;
    font-size: 11pt; font-weight: bold; letter-spacing: .06em;
    text-transform: uppercase; padding: 2.5mm 0;
    border-radius: 1mm; margin-bottom: 3.5mm;
  }
  .sheet-subtitle {
    font-size: 7.5pt; color: #888; margin-bottom: 3mm;
    text-align: center; letter-spacing: .02em;
  }

  .sheet-table { width: 100%; border-collapse: collapse; flex: 1; }
  .sheet-table th {
    background: #2C2C2A; color: #fff;
    font-size: 7pt; font-weight: bold;
    text-align: center; padding: 2mm 1mm;
    border: 0.5pt solid #999;
    text-transform: uppercase; letter-spacing: .03em;
    vertical-align: middle; line-height: 1.3;
  }
  .sheet-table td {
    border: 0.5pt solid #ccc; height: 6.5mm;
    padding: 0 1mm; font-size: 8pt; vertical-align: middle;
  }
  .sheet-table .td-num {
    text-align: center; color: #bbb; font-size: 7pt;
    width: 6mm; background: #fafafa;
  }
  .sheet-table tr:nth-child(even) td:not(.td-num) { background: #f9f8f6; }
  .total-row th {
    background: #3d3d3a; font-size: 7pt; text-align: right;
    padding-right: 2mm; letter-spacing: .01em;
  }
  .total-row td {
    background: #f0ede6; font-weight: bold;
    text-align: center; height: 7.5mm; font-size: 8pt;
    border: 0.5pt solid #aaa;
  }
  .total-row td.no-total { background: #f0ede6; }

  .sheet-footer {
    margin-top: 4mm; display: flex;
    justify-content: space-between; align-items: flex-end; gap: 5mm;
  }
  .sig-block { flex: 1; text-align: center; }
  .sig-line { border-bottom: 0.5pt solid #000; margin-bottom: 1.5mm; height: 7mm; }
  .sig-label { font-size: 7pt; color: #666; text-transform: uppercase; letter-spacing: .04em; }
  .sheet-stamp { font-size: 6pt; color: #ccc; text-align: right; line-height: 1.6; }

  @media print {
    .screen-only { display: none !important; }
    body { background: #fff; }
    .sheet-page { width: 100%; padding: 8mm; page-break-after: always; margin: 0; min-height: auto; }
    .sheet-page:last-child { page-break-after: avoid; }
    @page { size: A4 portrait; margin: 0; }
  }
</style>
</head>
<body>

<div class="screen-only">
  <div class="topbar">
    <div class="topbar-brand"><div class="dot"></div>Formulário de Produção</div>
    <div style="font-size:12px;color:var(--text3)">Configure e imprima</div>
  </div>

  <div class="main">

    <!-- EMPRESA -->
    <div class="card">
      <div class="card-title">Dados da empresa</div>
      <div style="display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:start">
        <div>
          <div style="font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Logo</div>
          <div class="logo-area" id="logoArea">
            <input type="file" id="logoInput" accept="image/*" onchange="loadLogo(this)">
            <div id="logoImgWrap">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--text3)"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
            </div>
            <div class="logo-area-text">
              <strong>Enviar logo</strong>PNG, JPG ou SVG
            </div>
          </div>
          <button class="btn-ghost" style="width:100%;margin-top:6px;font-size:11px;padding:5px 8px" onclick="removeLogo()">Remover</button>
        </div>
        <div>
          <div class="fields-grid" style="margin-bottom:10px">
            <div class="field-group" style="grid-column:1/-1">
              <label>Nome da empresa</label>
              <input id="nomeEmpresa" type="text" placeholder="Ex: Confecções Silva Ltda" oninput="buildPreview()">
            </div>
            <div class="field-group">
              <label>CNPJ</label>
              <input id="cnpj" type="text" placeholder="00.000.000/0001-00" oninput="buildPreview()">
            </div>
            <div class="field-group">
              <label>Telefone</label>
              <input id="telefone" type="text" placeholder="(00) 00000-0000" oninput="buildPreview()">
            </div>
          </div>
          <div class="field-group">
            <label>Endereço</label>
            <input id="endereco" type="text" placeholder="Rua, número, cidade — UF" oninput="buildPreview()">
          </div>
        </div>
      </div>
    </div>

    <!-- COLUNAS -->
    <div class="card">
      <div class="card-title">
        Escolha as informações do formulário
        <span class="badge" id="colCount">0 selecionadas</span>
      </div>
      <div class="cols-grid" id="colsGrid"></div>

      <!-- NOMES PERSONALIZADOS -->
      <div class="col-name-inputs" id="colNamesWrap" style="display:none">
        <div class="hint">Edite os nomes das colunas que aparecerão no formulário impresso:</div>
        <div class="col-names-grid" id="colNamesGrid"></div>
      </div>
    </div>

    <!-- CONFIG IMPRESSÃO -->
    <div class="card">
      <div class="card-title">Configurações de impressão</div>
      <div class="fields-grid three">
        <div class="field-group">
          <label>Registros por folha</label>
          <select id="numLinhas" onchange="buildPreview()">
            <option value="5">5 registros</option>
            <option value="6">6 registros</option>
            <option value="7">7 registros</option>
            <option value="8" selected>8 registros</option>
            <option value="10">10 registros</option>
          </select>
        </div>
        <div class="field-group">
          <label>Título do formulário</label>
          <input id="tituloForm" type="text" value="Controle de Produção" oninput="buildPreview()">
        </div>
        <div class="field-group">
          <label>Cópias</label>
          <input id="numCopias" type="number" value="1" min="1" max="20" oninput="buildPreview()">
        </div>
      </div>
    </div>

    <!-- ACTION -->
    <div class="action-bar">
      <button class="btn-print" onclick="window.print()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Imprimir formulário
      </button>
      <button class="btn-ghost" onclick="buildPreview();this.textContent='✓ Atualizado!';setTimeout(()=>this.textContent='↺ Atualizar prévia',1500)">↺ Atualizar prévia</button>
      <span class="status-msg" id="statusMsg"></span>
    </div>

    <div class="preview-label">Prévia — como vai ficar impresso</div>
    <div class="preview-scroll" id="previewArea"></div>
  </div>
</div>

<!-- PRINT TARGET -->
<div id="printTarget"></div>

<script>
/* ── DEFINIÇÃO DAS COLUNAS DISPONÍVEIS ── */
const ALL_COLS = [
  { id: 'produto',    label: 'Produto',          desc: 'Nome ou código do produto',   locked: false, hasTotal: false },
  { id: 'modelo',     label: 'Modelo',            desc: 'Modelo / referência',          locked: false, hasTotal: false },
  { id: 'cor',        label: 'Cor',               desc: 'Cor da peça',                  locked: false, hasTotal: false },
  { id: 'tamanho',    label: 'Tamanho',           desc: 'P, M, G, GG etc.',             locked: false, hasTotal: false },
  { id: 'op',         label: 'OP',                desc: 'Ordem de produção',            locked: false, hasTotal: false },
  { id: 'lote',       label: 'Lote',              desc: 'Número do lote',               locked: false, hasTotal: false },
  { id: 'qtd_conf',   label: 'Qtd. Conferida',   desc: 'Total de peças conferidas',    locked: false, hasTotal: true  },
  { id: 'qtd_def',    label: 'Qtd. Defeitos',    desc: 'Peças com defeito',            locked: false, hasTotal: true  },
  { id: 'num_cost',   label: 'Nº Costureira',    desc: 'Identificação da costureira',  locked: false, hasTotal: false },
  { id: 'maquina',    label: 'Máquina',           desc: 'Nº ou nome da máquina',        locked: false, hasTotal: false },
  { id: 'operador',   label: 'Operador',          desc: 'Nome do operador',             locked: false, hasTotal: false },
  { id: 'turno',      label: 'Turno',             desc: 'Turno de trabalho',            locked: false, hasTotal: false },
  { id: 'hora_ini',   label: 'Hora Início',      desc: 'Horário de início',            locked: false, hasTotal: false },
  { id: 'hora_fim',   label: 'Hora Fim',         desc: 'Horário de término',           locked: false, hasTotal: false },
  { id: 'obs',        label: 'Observação',        desc: 'Campo livre para anotação',    locked: false, hasTotal: false },
];

/* seleção padrão (replicando o formulário original) */
let selected = new Set(['produto','cor','tamanho','op','qtd_conf','qtd_def','num_cost']);
let customLabels = {};
let logoDataUrl = null;

/* ── RENDER TOGGLES ── */
function renderToggles() {
  const grid = document.getElementById('colsGrid');
  grid.innerHTML = ALL_COLS.map(col => {
    const on = selected.has(col.id);
    return '<label class="col-toggle'+(on?' active':'')+(col.locked?' locked':'')+'" data-col="'+col.id+'" onclick="toggleCol(''+col.id+'',this)" style="cursor:pointer">'+
      '<div class="toggle-check">'+
        '<svg width="11" height="11" viewBox="0 0 12 12" fill="none">'+
          '<path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>'+
        '</svg>'+
      '</div>'+
      '<div class="col-toggle-info">'+
        '<div class="col-toggle-name">'+col.label+'</div>'+
        '<div class="col-toggle-desc">'+col.desc+'</div>'+
      '</div>'+
    '</label>';
  }).join('');
  document.getElementById('colCount').textContent = selected.size + ' selecionada' + (selected.size!==1?'s':'');
  renderNameInputs();
}

function toggleCol(id, el) {
  if(!el) el = document.querySelector('[data-col="'+id+'"]');
  if(!el) return;
  if (el.classList.contains('locked')) return;
  if (selected.has(id)) { selected.delete(id); el.classList.remove('active'); }
  else { selected.add(id); el.classList.add('active'); }
  document.getElementById('colCount').textContent = selected.size + ' selecionada' + (selected.size!==1?'s':'');
  renderNameInputs();
  buildPreview();
}

function renderNameInputs() {
  const wrap = document.getElementById('colNamesWrap');
  const grid = document.getElementById('colNamesGrid');
  const activeCols = ALL_COLS.filter(c => selected.has(c.id));
  if (activeCols.length === 0) { wrap.style.display='none'; return; }
  wrap.style.display = 'block';
  grid.innerHTML = activeCols.map(col => {
    const val = customLabels[col.id] || col.label;
    return `<div class="col-name-field">
      <label>${col.label}</label>
      <input type="text" value="${val}" placeholder="${col.label}" 
             oninput="customLabels['${col.id}']=this.value;buildPreview()">
    </div>`;
  }).join('');
}

/* ── LOGO ── */
function loadLogo(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    logoDataUrl = e.target.result;
    document.getElementById('logoImgWrap').innerHTML = `<img src="${logoDataUrl}" style="max-height:48px;max-width:120px;object-fit:contain">`;
    buildPreview();
  };
  reader.readAsDataURL(file);
}
function removeLogo() {
  logoDataUrl = null;
  document.getElementById('logoImgWrap').innerHTML = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--text3)"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>`;
  document.getElementById('logoInput').value = '';
  buildPreview();
}

/* ── BUILD SHEET ── */
function g(id) { return (document.getElementById(id)||{}).value||''; }

function buildSheet() {
  const nome   = g('nomeEmpresa') || 'Nome da Empresa';
  const cnpj   = g('cnpj');
  const tel    = g('telefone');
  const end    = g('endereco');
  const titulo = g('tituloForm') || 'Controle de Produção';

  const infoLine = [cnpj&&'CNPJ: '+cnpj, tel&&'Tel: '+tel, end].filter(Boolean).join(' · ');
  const logoHtml = logoDataUrl
    ? '<img src="'+logoDataUrl+'" style="max-width:100%;max-height:100%;object-fit:contain">'
    : '<div class="sheet-logo-placeholder">LOGO</div>';

  // Buscar dados do localStorage (cadastrados no app)
  const produtos = JSON.parse(localStorage.getItem('produzai_prods')||'[]');
  const cores    = JSON.parse(localStorage.getItem('produzai_cores')||'["Azul","Preto","Branco","Cinza","Vermelho","Verde","Rosa","Amarelo"]');
  const tamanhos = JSON.parse(localStorage.getItem('produzai_tams')||'["PP","P","M","G","GG","XG"]');

  // Campos extras configurados
  const camposExtras = [];
  if(selected.has('op'))       camposExtras.push(customLabels['op']||'OP');
  if(selected.has('lote'))     camposExtras.push(customLabels['lote']||'Lote');
  if(selected.has('turno'))    camposExtras.push(customLabels['turno']||'Turno');
  if(selected.has('hora_ini')) camposExtras.push(customLabels['hora_ini']||'Hora Início');
  if(selected.has('hora_fim')) camposExtras.push(customLabels['hora_fim']||'Hora Fim');

  // Checkboxes de produtos
  const prodBoxes = produtos.length > 0
    ? produtos.map(p => '<span class="cb-item"><span class="cb-box"></span>'+p+'</span>').join('')
    : '<span style="color:#999;font-size:9pt">Cadastre produtos no app</span>';

  // Checkboxes de cores
  const corBoxes = cores.map(c => '<span class="cb-item"><span class="cb-box"></span>'+c+'</span>').join('');

  // Checkboxes de tamanhos
  const tamBoxes = tamanhos.map(t => '<span class="cb-item"><span class="cb-box"></span>'+t+'</span>').join('');

  // Campos extras com linha
  const extraFields = camposExtras.map(f =>
    '<span class="extra-field"><span class="extra-label">'+f+':</span><span class="extra-line"></span></span>'
  ).join('');

  // Campos fixos: Qtd, Defeitos, Operador
  const labelQtd = customLabels['qtd_conf']||'Qtd. Conferida';
  const labelDef = customLabels['qtd_def']||'Qtd. Defeitos';
  const labelOp  = customLabels['operador']||'Nome do Operador';

  // Bloco de 1 registro
  const bloco = '<div class="registro-bloco">'+
    '<div class="cb-row"><span class="cb-label">Modelo:</span><span class="cb-options">'+prodBoxes+'</span></div>'+
    '<div class="cb-row"><span class="cb-label">Cor:</span><span class="cb-options">'+corBoxes+'</span></div>'+
    '<div class="cb-row"><span class="cb-label">Tamanho:</span><span class="cb-options">'+tamBoxes+'</span></div>'+
    (extraFields ? '<div class="extra-row">'+extraFields+'</div>' : '')+
    '<div class="campos-row">'+
      '<span class="campo-fixo"><span class="campo-label">'+labelQtd+':</span><span class="campo-line"></span></span>'+
      '<span class="campo-fixo"><span class="campo-label">'+labelDef+':</span><span class="campo-line"></span></span>'+
      '<span class="campo-fixo campo-wide"><span class="campo-label">'+labelOp+':</span><span class="campo-line"></span></span>'+
    '</div>'+
  '</div>';

  // Calcular quantos blocos cabem (estimativa: cada bloco ~28mm, folha útil ~250mm)
  const nBlocos = parseInt(g('numLinhas')) || 8;
  let blocos = '';
  for(let i=0;i<nBlocos;i++) blocos += bloco;

  return '<div class="sheet-page">'+
    '<div class="sheet-header">'+
      '<div class="sheet-logo">'+logoHtml+'</div>'+
      '<div class="sheet-company">'+
        '<div class="emp-nome">'+nome+'</div>'+
        (infoLine ? '<div class="emp-info">'+infoLine+'</div>' : '')+
      '</div>'+
      '<div class="sheet-meta">'+
        '<div class="sheet-meta-row"><span>Conferente</span><div class="meta-line"></div></div>'+
        '<div class="sheet-meta-row"><span>Data</span><div class="meta-line" style="min-width:32mm"></div></div>'+
      '</div>'+
    '</div>'+
    '<div class="sheet-title">'+titulo+'</div>'+
    blocos+
    '<div class="sheet-footer">'+
      '<div class="sig-block"><div class="sig-line"></div><div class="sig-label">Assinatura do responsável</div></div>'+
      '<div class="sig-block"><div class="sig-line"></div><div class="sig-label">Visto do supervisor</div></div>'+
      '<div class="sheet-stamp">'+titulo+'<br>'+new Date().getFullYear()+'</div>'+
    '</div>'+
  '</div>';
}

function buildPreview() {
  const copias = Math.max(1, Math.min(20, parseInt(g('numCopias'))||1));
  let html = '';
  for (let i = 0; i < copias; i++) html += buildSheet();
  document.getElementById('previewArea').innerHTML = html;
  document.getElementById('printTarget').innerHTML = html;
  const total = copias;
  document.getElementById('statusMsg').textContent = `${total} página${total>1?'s':''} pronta${total>1?'s':''} para impressão`;
}

window.addEventListener('beforeprint', () => {
  document.getElementById('printTarget').innerHTML = document.getElementById('previewArea').innerHTML;
});

/* ── INIT ── */
// Carregar dados da empresa do localStorage automaticamente
function carregarDadosEmpresa(){
  try{
    const emp = JSON.parse(localStorage.getItem('produzai_empresa')||'{}');
    if(emp.nome) document.getElementById('nomeEmpresa').value = emp.nome;
    if(emp.cnpj) document.getElementById('cnpj').value = emp.cnpj;
    if(emp.telefone) document.getElementById('telefone').value = emp.telefone;
    if(emp.endereco) document.getElementById('endereco') && (document.getElementById('endereco').value = emp.endereco);
    // Carregar logo
    if(emp.logo_url || localStorage.getItem('produzai_logo')){
      const logo = emp.logo_url || localStorage.getItem('produzai_logo');
      if(logo && logo.startsWith('data:')){
        logoDataUrl = logo;
        document.getElementById('logoImgWrap').innerHTML = '<img src="'+logo+'" style="max-height:48px;max-width:120px;object-fit:contain">';
      }
    }
  }catch(e){}
}

renderToggles();
carregarDadosEmpresa();
buildPreview();
</script>
</body>
</html>
